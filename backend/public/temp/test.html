<!doctype html>
 
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My PDF Viewer</title>
  <script 
src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.0.943/pdf.min.js">
  </script>
</head>
<body>
     <div id="my_pdf_viewer" style="width: 100px;">
        <div id="canvas_container" style="width: 100px;">
            <canvas id="pdf_renderer" style="width: 100px;"></canvas>
        </div>
    </div>
    <script>
        var myState = {
            pdf: null,
            currentPage: 1,
            zoom:1,
        }
     
        pdfjsLib.getDocument('https://res.cloudinary.com/dh22eqe5d/image/upload/v1718720010/mvntkp6xpu4o1aezx22m.pdf').then((pdf) => {
     
            myState.pdf = pdf;
            render();
        });
        function render() {
            myState.pdf.getPage(myState.currentPage).then((page) => {
         
                var canvas = document.getElementById("pdf_renderer");
                var ctx = canvas.getContext('2d');
     
                var viewport = page.getViewport(myState.zoom);
                canvas.width = viewport.width;
                canvas.height = viewport.height;
         
                page.render({
                    canvasContext: ctx,
                    viewport: viewport
                }).promise.then(() => {
                    // Convert canvas to PNG image
                    var canvas = document.getElementById("pdf_renderer");
                    var image = canvas.toDataURL("image/png");

                    // Save the image
                    var link = document.createElement('a');
                    link.href = image;
                    link.download = 'my_pdf_image.png';
                    link.click();
                });
            });
        }
    </script>
</body>
</html>


{items.map((product) => (
    <div key={product.id} className="group relative">
      <div className="aspect-h-1 aspect-w-1 w-full overflow-hidden rounded-md bg-gray-200 lg:aspect-none group-hover:opacity-75 lg:h-80">
        <img
          src={product.imageSrc}
          alt={product.imageAlt}
          className="h-full w-full object-cover object-center lg:h-full lg:w-full"
        />
      </div>
      <div className="mt-4 flex justify-between">
        <div>
          <h3 className="text-sm text-gray-700">
            <a href={product.href}>
              <span aria-hidden="true" className="absolute inset-0" />
              {product.name}
            </a>
          </h3>
          <p className="mt-1 text-sm text-gray-500">
            {product.color}
          </p>
        </div>
        <p className="text-sm font-medium text-gray-900">
          {product.price}
        </p>
      </div>
    </div>
  ))}
